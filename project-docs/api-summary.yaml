openapi: "3.1.0"
info:
  title: TodosApp API
  description: REST API for the TodosApp task management application
  version: "0.1.0"
  contact:
    name: vdat4869
    url: https://github.com/vdat4869/TodosApp

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api.todosapp.example.com/api
    description: Production (TBD)

tags:
  - name: auth
    description: Authentication endpoints
  - name: todos
    description: Todo CRUD operations
  - name: tags
    description: Tag management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Todo:
      type: object
      properties:
        id:          { type: string, format: uuid }
        title:       { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        completed:   { type: boolean, default: false }
        priority:    { type: string, enum: [low, medium, high] }
        due_date:    { type: string, format: date-time, nullable: true }
        completed_at:{ type: string, format: date-time, nullable: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }
        user_id:     { type: string, format: uuid }
        tags:
          type: array
          items: { $ref: '#/components/schemas/Tag' }
      required: [id, title, completed, priority, created_at, user_id]

    CreateTodoRequest:
      type: object
      properties:
        title:       { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, nullable: true }
        priority:    { type: string, enum: [low, medium, high], default: medium }
        due_date:    { type: string, format: date-time, nullable: true }
        tag_ids:     { type: array, items: { type: string, format: uuid } }
      required: [title]

    UpdateTodoRequest:
      type: object
      properties:
        title:       { type: string, minLength: 1, maxLength: 255 }
        description: { type: string, nullable: true }
        priority:    { type: string, enum: [low, medium, high] }
        due_date:    { type: string, format: date-time, nullable: true }
        tag_ids:     { type: array, items: { type: string, format: uuid } }

    Tag:
      type: object
      properties:
        id:    { type: string, format: uuid }
        name:  { type: string, maxLength: 50 }
        color: { type: string, pattern: '^#[0-9A-Fa-f]{6}$' }
      required: [id, name, color]

    User:
      type: object
      properties:
        id:         { type: string, format: uuid }
        email:      { type: string, format: email }
        created_at: { type: string, format: date-time }
      required: [id, email]

    AuthResponse:
      type: object
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }
        user:          { $ref: '#/components/schemas/User' }

    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field:   { type: string }
              message: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

paths:
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string, format: email }
                password: { type: string, minLength: 8 }
              required: [email, password]
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        "409":
          description: Email already in use

  /auth/login:
    post:
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout and invalidate refresh token
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Logged out }

  /auth/me:
    get:
      tags: [auth]
      summary: Get current authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /todos:
    get:
      tags: [todos]
      summary: List all todos for current user
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [all, active, completed] }
          description: Filter by completion status
        - in: query
          name: priority
          schema: { type: string, enum: [low, medium, high] }
        - in: query
          name: tag
          schema: { type: string }
          description: Filter by tag ID
        - in: query
          name: search
          schema: { type: string }
          description: Full-text search on title/description
        - in: query
          name: sort
          schema: { type: string, enum: [created_at, due_date, priority, title] }
        - in: query
          name: order
          schema: { type: string, enum: [asc, desc] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Todo' }
    post:
      tags: [todos]
      summary: Create a new todo
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTodoRequest' }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Todo' }

  /todos/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [todos]
      summary: Get a single todo
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Todo' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      tags: [todos]
      summary: Update a todo
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTodoRequest' }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Todo' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [todos]
      summary: Delete a todo
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Deleted }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }

  /todos/{id}/toggle:
    patch:
      tags: [todos]
      summary: Toggle todo completion status
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Todo' }

  /tags:
    get:
      tags: [tags]
      summary: List all tags for current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Tag' }
    post:
      tags: [tags]
      summary: Create a new tag
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:  { type: string, minLength: 1, maxLength: 50 }
                color: { type: string, pattern: '^#[0-9A-Fa-f]{6}$' }
              required: [name, color]
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }

  /tags/{id}:
    delete:
      tags: [tags]
      summary: Delete a tag
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
