services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todosapp
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '8080:8080'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/todosapp?schema=public
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=prod-super-secret-key-change-me-in-prod
      - JWT_EXPIRES_IN=15m
      - CORS_ORIGIN=https://yourdomain.com
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
